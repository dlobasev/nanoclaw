name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Lightsail
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ubuntu
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            export XDG_RUNTIME_DIR=/run/user/$(id -u)
            export DBUS_SESSION_BUS_ADDRESS=unix:path=$XDG_RUNTIME_DIR/bus
            cd ~/nanoclaw
            git pull origin main
            npm install
            npm run build
            ./container/build.sh
            rm -rf /var/lib/nanoclaw/data/sessions/*/agent-runner-src/
            # Copy persona file to runtime groups (no-clobber: don't overwrite agent edits)
            for dir in /var/lib/nanoclaw/groups/*/; do
              cp -n ~/nanoclaw/personality/SOUL.md "$dir" 2>/dev/null || true
            done
            systemctl --user restart nanoclaw
